<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Vietlott Predictor Online</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
  <style>
    body.light { background: #f9f9f9; color: #000; }
    body.dark { background: #121212; color: #fff; }
    h1 { color: #d32f2f; }
    .product { margin: 10px 0; padding: 10px; background: #222; border-radius: 6px; }
    body.light .product { background: #fff; color: #000; }
    button { background: #d32f2f; color: #fff; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
    button:hover { background: #b71c1c; }
    .numbers { font-size: 20px; font-weight: bold; margin-top: 10px; }
    pre { background: #333; padding: 10px; border-radius: 6px; }
    body.light pre { background: #eee; color: #000; }
    .birth { margin-top: 20px; padding: 10px; background: #222; border-radius: 6px; }
    body.light .birth { background: #fff; color: #000; }
    select { margin: 5px; padding: 5px; }
    #modeToggle { margin-bottom: 20px; }
  </style>
</head>
<body class="dark">
  <h1>Ứng dụng dự đoán Vietlott Online</h1>
  <button id="modeToggle">Chuyển sang Light Mode</button>
  <p>Cập nhật dữ liệu trực tiếp từ <a href="https://vietlott.vn" target="_blank">Vietlott.vn</a></p>

  <div id="latest-result">
    <h2>Kết quả kỳ quay gần nhất</h2>
    <pre id="result-text">Đang tải dữ liệu...</pre>
  </div>

  <div id="products"></div>

  <div class="birth">
    <h2>Dự đoán số theo ngày sinh</h2>
    <label>Ngày: <select id="day"></select></label>
    <label>Tháng: <select id="month"></select></label>
    <label>Năm: <select id="year"></select></label>
    <button onclick="predictByBirthday()">Dự đoán số may mắn</button>
    <div id="birthday-result"></div>
  </div>

<script>
const products = [
  { name: "Mega 6/45", count: 6, max: 45 },
  { name: "Power 6/55", count: 6, max: 55 },
  { name: "Keno", count: 10, max: 80 },
  { name: "Bingo 18", count: 18, max: 90 },
  { name: "Lotto 5/35", count: 5, max: 35 },
  { name: "Max 3D", count: 3, max: 9 },
  { name: "Max 3D Pro", count: 4, max: 9 },
  { name: "Max 3D+", count: 4, max: 9 }
];

// Huấn luyện mô hình AI đơn giản
async function trainModel(max) {
  const xs = tf.tensor2d([...Array(max).keys()].map(i=>[i+1]), [max,1]);
  const ys = tf.tensor2d([...Array(max).keys()].map(i=>[(i+1)/max]), [max,1]);
  const model = tf.sequential();
  model.add(tf.layers.dense({units: 8, activation:'relu', inputShape:[1]}));
  model.add(tf.layers.dense({units: 1, activation:'sigmoid'}));
  model.compile({loss:'meanSquaredError', optimizer:'adam'});
  await model.fit(xs, ys, {epochs:10}); // epochs nhỏ để nhanh
  return model;
}

// Dự đoán bằng AI cho từng game
async function predictAI(name, count, max) {
  const model = await trainModel(max);
  let scores = [];
  for (let i=1; i<=max; i++) {
    const out = model.predict(tf.tensor2d([i],[1,1]));
    const val = (await out.data())[0];
    scores.push({num:i,score:val});
  }
  scores.sort((a,b)=>b.score-a.score);
  const lucky = scores.slice(0,count).map(s=>s.num).sort((a,b)=>a-b);
  document.getElementById("result-" + name).innerHTML =
    `<div class="numbers">${lucky.join(" - ")}</div>`;
}

// Render UI
const container = document.getElementById("products");
products.forEach(p => {
  const div = document.createElement("div");
  div.className = "product";
  div.innerHTML = `
    <h2>${p.name}</h2>
    <button onclick="predictAI('${p.name}', ${p.count}, ${p.max})">Dự đoán bằng AI</button>
    <div id="result-${p.name}"></div>
  `;
  container.appendChild(div);
});

// Fetch dữ liệu Vietlott (demo)
async function fetchData() {
  try {
    const res = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent("https://vietlott.vn"));
    const data = await res.json();
    const html = data.contents;
    const regex = /<div class="result-number">([\s\S]*?)<\/div>/;
    const match = html.match(regex);
    if (match) {
      document.getElementById("result-text").textContent = match[1].replace(/<[^>]+>/g, '').trim();
    } else {
      document.getElementById("result-text").textContent = "Không tìm thấy dữ liệu.";
    }
  } catch (err) {
    document.getElementById("result-text").textContent = "Lỗi kết nối: " + err;
  }
}
setInterval(fetchData, 60000);
fetchData();

// Ngày sinh
function setupBirthdaySelectors() {
  const daySel = document.getElementById("day");
  const monthSel = document.getElementById("month");
  const yearSel = document.getElementById("year");
  for (let i=1; i<=31; i++) daySel.innerHTML += `<option>${i}</option>`;
  for (let i=1; i<=12; i++) monthSel.innerHTML += `<option>${i}</option>`;
  for (let i=1950; i<=2026; i++) yearSel.innerHTML += `<option>${i}</option>`;
}

async function predictByBirthday() {
  const day = parseInt(document.getElementById("day").value);
  const month = parseInt(document.getElementById("month").value);
  const year = parseInt(document.getElementById("year").value);
  const model = await trainModel(45);
  let scores = [];
  for (let i=1; i<=45; i++) {
    const out = model.predict(tf.tensor2d([i],[1,1]));
    const v = (await out.data())[0];
    scores.push({num:i,score:v});
  }
  scores.sort((a,b)=>b.score-a.score);
  const lucky = scores.slice(0,6).map(s=>s.num).sort((a,b)=>a-b);
  document.getElementById("birthday-result").innerHTML =
    `<div class="numbers">Số may mắn: ${lucky.join(" - ")}</div>`;
}

setupBirthdaySelectors();

// Light/Dark mode toggle
const modeToggle = document.getElementById("modeToggle");
modeToggle.addEventListener("click", () => {
  if (document.body.classList.contains("dark")) {
    document.body.classList.remove("dark");
    document.body.classList.add("light");
    modeToggle.textContent = "Chuyển sang Dark Mode";
  } else {
    document.body.classList.remove("light");
    document.body.classList.add("dark");
    modeToggle.textContent = "Chuyển sang Light Mode";
  }
});
</script>
</body>
</html>
