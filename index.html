<!DOCTYPE html>
<html lang="vi" x-data="app()" :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vietlott AI - Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); min-height: 100vh; overscroll-behavior-y: contain; }
        .ball { display: inline-flex; align-items: center; justify-content: center; width: 38px; height: 38px; border-radius: 50%; font-weight: bold; color: white; margin: 3px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2); font-size: 13px; }
        .max3d-ball { width: 50px; height: 50px; background: radial-gradient(circle at 30% 30%, #4facfe, #00f2fe); font-size: 18px; }
        .mega-ball { background: radial-gradient(circle at 30% 30%, #ff4d4d, #b30000); }
        .power-ball { background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b); color: #000; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .heatmap-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300" x-init="startApp()">

    <header class="sticky top-0 z-50 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-700">
        <div class="max-w-md mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <h1 class="font-bold text-xl tracking-tight uppercase italic">Vietlott <span class="text-red-600">AI</span></h1>
            </div>
            <button @click="toggleDarkMode()" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700">
                <i :data-lucide="darkMode ? 'sun' : 'moon'" class="w-6 h-6 text-yellow-500"></i>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto pb-32 min-h-screen">
        <div x-show="activeTab === 'home'" class="animate-in fade-in duration-300">
            <div class="flex overflow-x-auto py-4 px-4 gap-3 no-scrollbar">
                <template x-for="game in games" :key="game.id">
                    <button @click="selectGame(game.id)" :class="activeGame === game.id ? 'bg-red-600 text-white shadow-lg' : 'bg-white dark:bg-gray-800'" class="whitespace-nowrap px-4 py-2 rounded-full shadow-sm font-medium transition-all border dark:border-gray-700" x-text="game.name"></button>
                </template>
            </div>

            <div class="px-4 mt-2">
                <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 shadow-xl border border-gray-100 dark:border-gray-700 relative">
                    <h2 class="text-lg font-bold mb-4 flex items-center justify-between">
                        <div class="flex items-center gap-2"><i data-lucide="cpu" class="text-purple-500 w-5 h-5"></i> <span x-text="getCurrentGame().name"></span></div>
                    </h2>

                    <div class="flex flex-wrap justify-center py-6 min-h-[120px] bg-gray-50 dark:bg-gray-900/50 rounded-2xl border border-dashed border-gray-300 dark:border-gray-700">
                        <template x-if="loading">
                            <div class="flex flex-col items-center gap-2"><div class="flex space-x-2"><div class="w-3 h-3 bg-red-600 rounded-full animate-bounce"></div><div class="w-3 h-3 bg-red-600 rounded-full animate-bounce [animation-delay:-.3s]"></div><div class="w-3 h-3 bg-red-600 rounded-full animate-bounce [animation-delay:-.5s]"></div></div></div>
                        </template>
                        <template x-if="!loading && currentPrediction.length > 0">
                            <div class="flex flex-wrap justify-center animate-in zoom-in items-center">
                                <template x-for="(num, index) in currentPrediction" :key="index">
                                    <div class="flex items-center"><span :class="getBallColor(index)" class="ball" x-text="num"></span></div>
                                </template>
                            </div>
                        </template>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mt-4">
                        <button @click="generatePrediction(false)" class="bg-red-600 text-white py-4 rounded-2xl font-bold shadow-lg uppercase active:scale-95 transition-all">AI Phân Tích</button>
                        <button @click="savePrediction()" :disabled="currentPrediction.length === 0" class="bg-emerald-600 disabled:opacity-50 text-white py-4 rounded-2xl font-bold shadow-lg uppercase active:scale-95 transition-all flex items-center justify-center gap-2">
                            <i data-lucide="save" class="w-4 h-4"></i> Lưu số
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div x-show="activeTab === 'history'" class="p-4 animate-in slide-in-from-right">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i data-lucide="bookmark"></i> Bộ số đã lưu</h2>
            <div class="space-y-3">
                <template x-for="(item, index) in savedNumbers" :key="index">
                    <div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] font-bold bg-blue-100 dark:bg-blue-900 text-blue-600 px-2 py-0.5 rounded uppercase" x-text="item.gameName"></span>
                            <button @click="deleteSaved(index)" class="text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                        <div class="flex flex-wrap gap-1">
                            <template x-for="n in item.numbers">
                                <span class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 dark:bg-gray-700 text-xs font-bold" x-text="n"></span>
                            </template>
                        </div>
                        <div class="mt-2 text-[9px] text-gray-400 italic" x-text="item.time"></div>
                    </div>
                </template>
                <template x-if="savedNumbers.length === 0">
                    <p class="text-center text-gray-500 mt-10 italic">Chưa có bộ số nào được lưu.</p>
                </template>
            </div>
        </div>

        <div x-show="activeTab === 'stats'" class="p-4 animate-in slide-in-from-right">
            <h2 class="text-xl font-bold mb-2 flex items-center gap-2"><i data-lucide="flame" class="text-orange-500"></i> Bản đồ nhiệt AI</h2>
            <p class="text-[11px] text-gray-400 mb-4 uppercase tracking-widest">Tần suất xuất hiện trong thuật toán dự báo</p>
            
            <div class="bg-white dark:bg-gray-800 p-4 rounded-3xl shadow-lg border border-gray-100 dark:border-gray-700">
                <div class="grid grid-cols-7 gap-2">
                    <template x-for="n in 45" :key="n">
                        <div :style="'background-color: rgba(239, 68, 68, ' + (getHeat(n)/100) + ')'" 
                             class="heatmap-cell border border-gray-100 dark:border-gray-700 transition-all duration-1000"
                             :class="getHeat(n) > 70 ? 'text-white' : 'text-gray-500'">
                            <span x-text="n < 10 ? '0'+n : n"></span>
                        </div>
                    </template>
                </div>
                <div class="mt-6 flex justify-between items-center text-[10px] font-bold uppercase text-gray-400">
                    <span>Lạnh (Ít nổ)</span>
                    <div class="h-2 w-32 rounded-full bg-gradient-to-r from-gray-100 to-red-600"></div>
                    <span>Nóng (Vừa nổ)</span>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full max-w-md left-1/2 -translate-x-1/2 bg-white/95 dark:bg-gray-800/95 backdrop-blur-lg border-t border-gray-200 dark:border-gray-700 px-6 pt-3 pb-6 flex justify-between items-center rounded-t-3xl shadow-2xl z-50">
        <div @click="switchTab('home')" :class="activeTab === 'home' ? 'text-red-600 scale-110' : 'text-gray-400'" class="flex flex-col items-center cursor-pointer transition-all"><i data-lucide="home"></i><span class="text-[9px] mt-1 font-bold">HOME</span></div>
        <div @click="switchTab('history')" :class="activeTab === 'history' ? 'text-red-600 scale-110' : 'text-gray-400'" class="flex flex-col items-center cursor-pointer transition-all"><i data-lucide="history"></i><span class="text-[9px] mt-1 font-bold">LỊCH SỬ</span></div>
        <div @click="switchTab('stats')" :class="activeTab === 'stats' ? 'text-red-600 scale-110' : 'text-gray-400'" class="flex flex-col items-center cursor-pointer transition-all"><i data-lucide="bar-chart-3"></i><span class="text-[9px] mt-1 font-bold">THỐNG KÊ</span></div>
        <div @click="activeTab = 'profile'" :class="activeTab === 'profile' ? 'text-red-600 scale-110' : 'text-gray-400'" class="flex flex-col items-center cursor-pointer transition-all"><i data-lucide="user"></i><span class="text-[9px] mt-1 font-bold">CÁ NHÂN</span></div>
    </nav>

    <script>
        function app() {
            return {
                darkMode: true, activeTab: 'home', activeGame: 'mega645',
                loading: false, currentPrediction: [], savedNumbers: [],
                heatData: {}, audioCtx: null,

                startApp() {
                    this.savedNumbers = JSON.parse(localStorage.getItem('vlot_saved') || '[]');
                    this.generateHeatData();
                    setInterval(() => this.generateHeatData(), 5000); // Cập nhật bản đồ nhiệt liên tục
                    lucide.createIcons();
                },

                generateHeatData() {
                    for(let i=1; i<=55; i++) { this.heatData[i] = Math.floor(Math.random() * 100); }
                },
                getHeat(n) { return this.heatData[n] || 0; },

                playTone(freq, duration) {
                    try {
                        if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        const osc = this.audioCtx.createOscillator();
                        const gain = this.audioCtx.createGain();
                        osc.frequency.setValueAtTime(freq, this.audioCtx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + duration);
                        osc.connect(gain); gain.connect(this.audioCtx.destination);
                        osc.start(); osc.stop(this.audioCtx.currentTime + duration);
                    } catch(e) {}
                },

                selectGame(id) { this.playTone(600, 0.1); this.activeGame = id; this.currentPrediction = []; },
                switchTab(tab) { this.playTone(500, 0.1); this.activeTab = tab; setTimeout(() => lucide.createIcons(), 10); },
                toggleDarkMode() { this.darkMode = !this.darkMode; },

                generatePrediction(jackpot) {
                    this.playTone(400, 0.1); this.loading = true; this.currentPrediction = [];
                    const game = this.games.find(g => g.id === this.activeGame);
                    setTimeout(() => {
                        let nums = new Set();
                        while(nums.size < game.count) {
                            let n = Math.floor(Math.random() * game.max) + 1;
                            nums.add(n < 10 ? '0' + n : n.toString());
                        }
                        this.currentPrediction = Array.from(nums).sort();
                        this.loading = false; this.playTone(900, 0.3);
                        confetti({ particleCount: 100, spread: 70, origin: { y: 0.7 } });
                    }, 1000);
                },

                savePrediction() {
                    const newItem = {
                        gameName: this.games.find(g => g.id === this.activeGame).name,
                        numbers: [...this.currentPrediction],
                        time: new Date().toLocaleString('vi-VN')
                    };
                    this.savedNumbers.unshift(newItem);
                    localStorage.setItem('vlot_saved', JSON.stringify(this.savedNumbers));
                    this.playTone(1200, 0.2);
                    alert("Đã lưu bộ số vào Lịch sử!");
                },

                deleteSaved(index) {
                    this.savedNumbers.splice(index, 1);
                    localStorage.setItem('vlot_saved', JSON.stringify(this.savedNumbers));
                },

                getCurrentGame() { return this.games.find(g => g.id === this.activeGame); },
                getBallColor(index) {
                    if (this.activeGame === 'power655') return 'power-ball';
                    if (this.activeGame === 'mega645') return 'mega-ball';
                    return 'bg-blue-500';
                },

                games: [
                    { id: 'mega645', name: 'Mega 6/45', max: 45, count: 6 },
                    { id: 'power655', name: 'Power 6/55', max: 55, count: 7 },
                    { id: 'lotto535', name: 'Lotto 5/35', max: 35, count: 5 },
                    { id: 'keno', name: 'Keno', max: 80, count: 10 },
                    { id: 'max3d', name: 'Max 3D', max: 999, count: 1 }
                ]
            }
        }
    </script>
</body>
</html>
