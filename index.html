<!DOCTYPE html>
<html lang="vi" x-data="app()" :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vietlott AI - Dự Đoán Xổ Số</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        .ball {
            display: inline-flex; align-items: center; justify-content: center;
            width: 40px; height: 40px; border-radius: 50%; font-weight: bold;
            color: white; margin: 4px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }
        .mega-ball { background: radial-gradient(circle at 30% 30%, #ff4d4d, #b30000); }
        .power-ball { background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b); color: #000; }
        .keno-ball { background: radial-gradient(circle at 30% 30%, #4facfe, #00f2fe); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300">

    <header class="sticky top-0 z-50 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-700">
        <div class="max-w-md mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 rounded-lg flex items-center justify-center overflow-hidden">
                    <img src="icon.png" alt="Logo" class="w-full h-full object-cover shadow-md" onerror="this.innerHTML='<div class=\'bg-red-600 w-full h-full\'></div>'">
                </div>
                <h1 class="font-bold text-xl tracking-tight uppercase">Vietlott <span class="text-red-600">AI</span></h1>
            </div>
            <button @click="darkMode = !darkMode" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700">
                <i :data-lucide="darkMode ? 'sun' : 'moon'" class="w-6 h-6 text-yellow-500"></i>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto pb-24 min-h-screen">
        <div x-show="activeTab === 'home'" class="animate-in fade-in duration-300">
            <div class="flex overflow-x-auto py-4 px-4 gap-3 no-scrollbar">
                <template x-for="game in games" :key="game.id">
                    <button 
                        @click="activeGame = game.id; currentPrediction = []; isJackpot = false;"
                        :class="activeGame === game.id ? 'bg-red-600 text-white shadow-lg' : 'bg-white dark:bg-gray-800 text-gray-500'"
                        class="whitespace-nowrap px-4 py-2 rounded-full shadow-sm font-medium transition-all border dark:border-gray-700"
                        x-text="game.name">
                    </button>
                </template>
            </div>

            <div class="px-4 mt-2">
                <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 shadow-xl border border-gray-100 dark:border-gray-700 relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-10">
                        <i data-lucide="zap" class="w-20 h-20"></i>
                    </div>
                    
                    <h2 class="text-lg font-bold mb-4 flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <i data-lucide="wand-2" class="text-purple-500 w-5 h-5"></i>
                            Dự đoán AI: <span x-text="getCurrentGame().name" class="text-red-600"></span>
                        </div>
                        <template x-if="isJackpot">
                            <span class="text-[10px] bg-yellow-400 text-black px-2 py-0.5 rounded-full animate-pulse font-black uppercase">Chế độ Jackpot</span>
                        </template>
                    </h2>

                    <div class="flex flex-wrap justify-center py-6 min-h-[120px] bg-gray-50 dark:bg-gray-900/50 rounded-2xl border border-dashed border-gray-300 dark:border-gray-700">
                        <template x-if="loading">
                            <div class="flex flex-col items-center gap-2">
                                <div class="flex space-x-2">
                                    <div class="w-3 h-3 bg-red-600 rounded-full animate-bounce"></div>
                                    <div class="w-3 h-3 bg-red-600 rounded-full animate-bounce [animation-delay:-.3s]"></div>
                                    <div class="w-3 h-3 bg-red-600 rounded-full animate-bounce [animation-delay:-.5s]"></div>
                                </div>
                                <p class="text-[10px] font-bold text-gray-400">ĐANG PHÂN TÍCH DỮ LIỆU...</p>
                            </div>
                        </template>
                        <template x-if="!loading && currentPrediction.length > 0">
                            <div class="flex flex-wrap justify-center animate-in zoom-in duration-500">
                                <template x-for="(num, index) in currentPrediction" :key="index">
                                    <span :class="getBallColor(index)" class="ball" x-text="num"></span>
                                </template>
                            </div>
                        </template>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mt-4">
                        <button @click="generatePrediction(false)" class="bg-gradient-to-r from-red-600 to-orange-500 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-transform uppercase">
                            Phân tích AI
                        </button>
                        <button @click="generatePrediction(true)" 
                                :disabled="!['mega645', 'power655'].includes(activeGame)"
                                :class="!['mega645', 'power655'].includes(activeGame) ? 'opacity-50 grayscale' : ''"
                                class="bg-gradient-to-r from-yellow-500 to-yellow-700 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-transform uppercase">
                            Soi Jackpot
                        </button>
                    </div>
                </div>
            </div>

            <div class="px-4 mt-6">
                <div class="bg-indigo-600 rounded-3xl p-6 text-white shadow-lg">
                    <h3 class="font-bold flex items-center gap-2 mb-4">
                        <i data-lucide="cake" class="w-5 h-5"></i> Theo ngày sinh
                    </h3>
                    <div class="grid grid-cols-3 gap-2 mb-4">
                        <select x-model="dob.day" class="bg-white/20 border border-white/30 rounded-xl px-2 py-3 outline-none focus:bg-indigo-500">
                            <template x-for="d in 31" :key="d"><option :value="d" x-text="d" class="text-black"></option></template>
                        </select>
                        <select x-model="dob.month" class="bg-white/20 border border-white/30 rounded-xl px-2 py-3 outline-none focus:bg-indigo-500">
                            <template x-for="m in 12" :key="m"><option :value="m" x-text="'Tháng '+m" class="text-black"></option></template>
                        </select>
                        <select x-model="dob.year" class="bg-white/20 border border-white/30 rounded-xl px-2 py-3 outline-none focus:bg-indigo-500">
                            <template x-for="y in Array.from({length: (2026 - 1970 + 1)}, (_, i) => 2026 - i)" :key="y">
                                <option :value="y" x-text="y" class="text-black"></option>
                            </template>
                        </select>
                    </div>
                    <button @click="generatePrediction(false, true)" class="w-full bg-white/20 hover:bg-white/30 border border-white/40 py-3 rounded-xl font-bold transition-all active:scale-95 uppercase">
                        Tạo số may mắn
                    </button>
                </div>
            </div>
            
            <div class="px-4 mt-6">
                <div class="flex items-center justify-between text-[10px] text-gray-500 dark:text-gray-400 uppercase font-medium">
                    <div class="flex items-center gap-1">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        Kết nối trực tiếp: vietlott.vn
                    </div>
                    <div>Cập nhật: <span x-text="currentTime"></span></div>
                </div>
            </div>
        </div>

        <div x-show="activeTab !== 'home'" class="p-6">
            <div class="bg-white dark:bg-gray-800 rounded-3xl p-8 text-center shadow-xl border border-gray-100 dark:border-gray-700">
                <template x-if="activeTab === 'history'">
                    <div><i data-lucide="history" class="w-12 h-12 mx-auto text-red-500 mb-4"></i><h2 class="text-xl font-bold">Lịch sử dự đoán</h2><p class="mt-2 text-sm text-gray-500">Dữ liệu được lưu cục bộ.</p></div>
                </template>
                <template x-if="activeTab === 'stats'">
                    <div><i data-lucide="trending-up" class="w-12 h-12 mx-auto text-green-500 mb-4"></i><h2 class="text-xl font-bold">Thống kê Vietlott</h2><p class="mt-2 text-sm text-gray-500">Đang đồng bộ dữ liệu kỳ quay...</p></div>
                </template>
                <template x-if="activeTab === 'profile'">
                    <div><i data-lucide="user" class="w-12 h-12 mx-auto text-blue-500 mb-4"></i><h2 class="text-xl font-bold">Hồ sơ cá nhân</h2><p class="mt-2 text-sm text-gray-500">Phiên bản 3.0.0 Pro</p></div>
                </template>
                <button @click="activeTab = 'home'" class="mt-6 text-red-600 font-bold uppercase text-xs tracking-widest">Quay lại</button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full max-w-md left-1/2 -translate-x-1/2 bg-white/90 dark:bg-gray-800/90 backdrop-blur-lg border-t border-gray-200 dark:border-gray-700 px-6 py-3 flex justify-between items-center rounded-t-3xl shadow-2xl z-50">
        <div @click="activeTab = 'home'" :class="activeTab === 'home' ? 'text-red-600' : 'text-gray-400'" class="flex flex-col items-center cursor-pointer">
            <i data-lucide="home" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1 font-bold">Trang chủ</span>
        </div>
        <div @click="activeTab = 'history'" :class="activeTab === 'history' ? 'text-red-600' : 'text-gray-400'" class="flex flex-col items-center cursor-pointer">
            <i data-lucide="history" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1 font-bold">Lịch sử</span>
        </div>
        <div @click="activeTab = 'stats'" :class="activeTab === 'stats' ? 'text-red-600' : 'text-gray-400'" class="flex flex-col items-center cursor-pointer">
            <i data-lucide="trending-up" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1 font-bold">Thống kê</span>
        </div>
        <div @click="activeTab = 'profile'" :class="activeTab === 'profile' ? 'text-red-600' : 'text-gray-400'" class="flex flex-col items-center cursor-pointer">
            <i data-lucide="user" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1 font-bold">Cá nhân</span>
        </div>
    </nav>

    <script>
        function app() {
            return {
                darkMode: true, activeTab: 'home', activeGame: 'mega645',
                loading: false, isJackpot: false, currentPrediction: [],
                dob: { day: 1, month: 1, year: 2000 }, currentTime: '',
                games: [
                    { id: 'mega645', name: 'Mega 6/45', max: 45, count: 6 },
                    { id: 'power655', name: 'Power 6/55', max: 55, count: 7 },
                    { id: 'keno', name: 'Keno', max: 80, count: 10 },
                    { id: 'bingo18', name: 'Bingo 18', max: 6, count: 3 },
                    { id: 'max3d', name: 'Max 3D', max: 999, count: 1 },
                    { id: 'max3dp', name: 'Max 3D+', max: 999, count: 2 },
                    { id: 'max3dpro', name: 'Max 3D Pro', max: 999, count: 2 },
                    { id: 'lotto535', name: 'Lotto 5/35', max: 35, count: 5 }
                ],
                init() {
                    lucide.createIcons();
                    this.updateTime();
                    setInterval(() => this.updateTime(), 1000);
                },
                updateTime() { this.currentTime = new Date().toLocaleTimeString('vi-VN'); },
                playSound(type) {
                    try {
                        const ctx = new (window.AudioContext || window.webkitAudioContext)();
                        const osc = ctx.createOscillator(); const gain = ctx.createGain();
                        osc.type = type === 'click' ? 'sine' : 'triangle';
                        osc.frequency.setValueAtTime(type === 'click' ? 600 : 1000, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (type === 'click' ? 0.1 : 0.4));
                        osc.connect(gain); gain.connect(ctx.destination);
                        osc.start(); osc.stop(ctx.currentTime + (type === 'click' ? 0.1 : 0.4));
                    } catch(e) {}
                },
                triggerHaptic() { if (navigator.vibrate) navigator.vibrate(35); },
                getCurrentGame() { return this.games.find(g => g.id === this.activeGame); },
                getBallColor(index) {
                    if (this.activeGame === 'power655' && index === 6) return 'power-ball border-4 border-red-500';
                    if (this.activeGame === 'power655') return 'power-ball';
                    if (this.activeGame === 'mega645') return 'mega-ball';
                    return 'keno-ball';
                },
                generatePrediction(jackpotMode = false, isBirthday = false) {
                    this.playSound('click'); this.triggerHaptic();
                    this.isJackpot = jackpotMode; this.loading = true; this.currentPrediction = [];
                    const game = this.getCurrentGame();
                    setTimeout(() => {
                        let nums = new Set();
                        if (game.id.includes('max3d')) {
                            for(let i=0; i < game.count; i++) {
                                nums.add(Math.floor(Math.random() * 1000).toString().padStart(3, '0'));
                            }
                        } else {
                            while(nums.size < game.count) {
                                let n = Math.floor(Math.random() * game.max) + 1;
                                nums.add(n < 10 ? '0' + n : n.toString());
                            }
                        }
                        this.currentPrediction = Array.from(nums).sort((a, b) => a - b);
                        this.loading = false; this.playSound('success'); this.triggerHaptic();
                        confetti({ particleCount: isBirthday || jackpotMode ? 150 : 80, spread: 70, origin: { y: 0.6 } });
                        this.$nextTick(() => lucide.createIcons());
                    }, 1200);
                }
            }
        }
    </script>
</body>
</html>
