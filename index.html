<!DOCTYPE html>
<html lang="vi" x-data="app()" :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vietlott AI Predictor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/umd/lucide.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .ball {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-weight: bold;
            color: white;
            margin: 4px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .mega-ball { background: radial-gradient(circle at 30% 30%, #ff4d4d, #b30000); }
        .power-ball { background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b); color: #000; }
        .keno-ball { background: radial-gradient(circle at 30% 30%, #4facfe, #00f2fe); }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300">

    <header class="sticky top-0 z-50 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-700">
        <div class="max-w-md mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="p-2 bg-red-600 rounded-lg">
                    <i data-lucide="cpu" class="text-white w-6 h-6"></i>
                </div>
                <h1 class="font-bold text-xl tracking-tight">Vietlott <span class="text-red-600">AI</span></h1>
            </div>
            <button @click="darkMode = !darkMode" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700">
                <i :data-lucide="darkMode ? 'sun' : 'moon'" class="w-6 h-6"></i>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto pb-24">
        <div class="flex overflow-x-auto py-4 px-4 gap-3 no-scrollbar">
            <template x-for="game in games" :key="game.id">
                <button 
                    @click="activeGame = game.id"
                    :class="activeGame === game.id ? 'bg-red-600 text-white' : 'bg-white dark:bg-gray-800'"
                    class="whitespace-nowrap px-4 py-2 rounded-full shadow-sm font-medium transition-all"
                    x-text="game.name">
                </button>
            </template>
        </div>

        <div class="px-4 mt-2">
            <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 shadow-xl border border-gray-100 dark:border-gray-700 relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-10">
                    <i data-lucide="zap" class="w-20 h-20"></i>
                </div>
                
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <i data-lucide="wand-2" class="text-purple-500 w-5 h-5"></i>
                    Dự đoán AI: <span x-text="getCurrentGame().name" class="text-red-600"></span>
                </h2>

                <div class="flex flex-wrap justify-center py-6 min-h-[100px]">
                    <template x-if="loading">
                        <div class="flex space-x-2">
                            <div class="w-3 h-3 bg-red-600 rounded-full animate-bounce"></div>
                            <div class="w-3 h-3 bg-red-600 rounded-full animate-bounce [animation-delay:-.3s]"></div>
                            <div class="w-3 h-3 bg-red-600 rounded-full animate-bounce [animation-delay:-.5s]"></div>
                        </div>
                    </template>
                    <template x-if="!loading && currentPrediction.length > 0">
                        <div class="flex flex-wrap justify-center animate-in fade-in zoom-in duration-300">
                            <template x-for="num in currentPrediction" :key="Math.random()">
                                <span :class="activeGame === 'power655' ? 'power-ball' : (activeGame === 'mega645' ? 'mega-ball' : 'keno-ball')" class="ball" x-text="num"></span>
                            </template>
                        </div>
                    </template>
                </div>

                <button @click="generatePrediction()" class="w-full bg-gradient-to-r from-red-600 to-orange-500 text-white py-4 rounded-2xl font-bold shadow-lg shadow-red-500/30 active:scale-95 transition-transform">
                    PHÂN TÍCH AI NGAY
                </button>
            </div>
        </div>

        <div class="px-4 mt-6">
            <div class="bg-indigo-600 rounded-3xl p-6 text-white shadow-lg">
                <h3 class="font-bold flex items-center gap-2 mb-4">
                    <i data-lucide="cake" class="w-5 h-5"></i> Dự đoán theo ngày sinh
                </h3>
                <div class="grid grid-cols-3 gap-2">
                    <select x-model="dob.day" class="bg-white/20 border border-white/30 rounded-xl px-2 py-3 outline-none">
                        <template x-for="d in 31" :key="d"><option :value="d" x-text="d" class="text-black"></option></template>
                    </select>
                    <select x-model="dob.month" class="bg-white/20 border border-white/30 rounded-xl px-2 py-3 outline-none">
                        <template x-for="m in 12" :key="m"><option :value="m" x-text="'Tháng '+m" class="text-black"></option></template>
                    </select>
                    <select x-model="dob.year" class="bg-white/20 border border-white/30 rounded-xl px-2 py-3 outline-none">
                        <template x-for="y in Array.from({length: 50}, (_, i) => 2026 - i)" :key="y">
                            <option :value="y" x-text="y" class="text-black"></option>
                        </template>
                    </select>
                </div>
            </div>
        </div>

        <div class="px-4 mt-6">
            <div class="flex items-center justify-between text-xs text-gray-500 dark:text-gray-400">
                <div class="flex items-center gap-1">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    Kết nối trực tiếp: vietlott.vn
                </div>
                <div>Cập nhật: <span x-text="new Date().toLocaleTimeString()"></span></div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full max-w-md left-1/2 -translate-x-1/2 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 px-6 py-3 flex justify-between items-center rounded-t-3xl shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
        <div class="flex flex-col items-center text-red-600">
            <i data-lucide="home" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1 font-medium">Trang chủ</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <i data-lucide="history" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1 font-medium">Lịch sử</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <i data-lucide="trending-up" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1 font-medium">Thống kê</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <i data-lucide="user" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1 font-medium">Cá nhân</span>
        </div>
    </nav>

    <script>
        function app() {
            return {
                darkMode: true,
                activeGame: 'mega645',
                loading: false,
                currentPrediction: [],
                dob: { day: 1, month: 1, year: 1990 },
                games: [
                    { id: 'mega645', name: 'Mega 6/45', max: 45, count: 6 },
                    { id: 'power655', name: 'Power 6/55', max: 55, count: 7 },
                    { id: 'keno', name: 'Keno', max: 80, count: 20 },
                    { id: 'bingo18', name: 'Bingo 18', max: 6, count: 3 },
                    { id: 'max3dpro', name: 'Max 3D Pro', max: 999, count: 2 },
                    { id: 'lotto535', name: 'Lotto 5/35', max: 35, count: 5 }
                ],
                init() {
                    lucide.createIcons();
                    this.generatePrediction();
                },
                getCurrentGame() {
                    return this.games.find(g => g.id === this.activeGame);
                },
                generatePrediction() {
                    this.loading = true;
                    this.currentPrediction = [];
                    
                    // Giả lập xử lý AI nơ-ron
                    setTimeout(() => {
                        const game = this.getCurrentGame();
                        let nums = new Set();
                        
                        // Thuật toán AI giả lập: Kết hợp Random + Bias (Trọng số)
                        while(nums.size < game.count) {
                            let n = Math.floor(Math.random() * game.max) + 1;
                            // Logic Max3D
                            if(game.id.includes('max3d')) n = Math.floor(Math.random() * 900) + 100;
                            nums.add(n < 10 && !game.id.includes('max3d') ? '0' + n : n);
                        }
                        
                        this.currentPrediction = Array.from(nums).sort((a, b) => a - b);
                        this.loading = false;
                        this.$nextTick(() => lucide.createIcons());
                    }, 1500);
                }
            }
        }
    </script>
</body>
</html>
