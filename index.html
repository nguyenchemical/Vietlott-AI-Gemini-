<!DOCTYPE html>
<html lang="vi" x-data="app()" :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vietlott Pro All-in-One</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        html, body { height: 100%; overflow: hidden; position: fixed; width: 100%; font-family: sans-serif; background: #0f172a; color: #f8fafc; }
        main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 40px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .led-active { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 10px #22c55e; animation: blink 1.2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .ball {
            display: inline-flex; align-items: center; justify-content: center;
            width: 38px; height: 38px; border-radius: 50%; font-weight: 800;
            color: white; margin: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); font-size: 14px;
        }
        .bg-mega { background: radial-gradient(circle at 30% 30%, #ff4d4d, #b30000); }
        .bg-power { background: radial-gradient(circle at 30% 30%, #ff8c00, #cc7000); }
        .bg-special { background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b); color: #000; border: 2px solid #ef4444; }
        .bg-blue { background: radial-gradient(circle at 30% 30%, #4facfe, #00f2fe); }

        .jackpot-card { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); border: 1px solid rgba(255,255,255,0.1); }
        .text-gold { background: linear-gradient(to bottom, #fff5b1, #ffd700, #ff9500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
    </style>
</head>
<body class="flex flex-col" x-init="startApp()">

    <header class="flex-none px-4 h-14 flex items-center justify-between border-b border-white/5 bg-slate-900/80">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-red-600 rounded flex items-center justify-center font-black italic">V</div>
            <h1 class="font-black text-lg italic uppercase">Vietlott <span class="text-red-500">AI</span></h1>
        </div>
        <div class="flex items-center gap-2">
            <span class="led-active"></span>
            <span class="text-[10px] font-bold opacity-50 uppercase">Live Sync</span>
        </div>
    </header>

    <main class="no-scrollbar p-4">
        <div class="flex overflow-x-auto gap-2 mb-4 no-scrollbar">
            <template x-for="game in allGames" :key="game.id">
                <button @click="selectGame(game.id)" 
                    :class="activeGame === game.id ? 'bg-red-600 text-white' : 'bg-slate-800 text-white/40'"
                    class="whitespace-nowrap px-4 py-2 rounded-full text-[10px] font-black uppercase transition-all" 
                    x-text="game.name"></button>
            </template>
        </div>

        <div class="mb-4">
            <div class="jackpot-card rounded-[2rem] p-5 relative overflow-hidden">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-[10px] font-black uppercase text-white/30 tracking-widest" x-text="'Jackpot ' + currentG().name"></span>
                    <span class="text-[11px] font-black text-red-500" x-text="jackpotRate + '% 🚨'"></span>
                </div>
                <div class="text-3xl text-gold mb-1" x-text="formattedJackpot"></div>
                <div class="text-[9px] text-white/30 font-mono" x-text="'Kỳ #'+currentKy+' • 22/03/2026'"></div>
                
                <div class="mt-3 h-1 w-full bg-white/5 rounded-full overflow-hidden">
                    <div class="h-full bg-gradient-to-r from-green-500 via-yellow-500 to-red-600 transition-all duration-1000" :style="'width: '+jackpotRate+'%'"></div>
                </div>

                <div class="flex gap-1 mt-4">
                    <template x-for="day in ['T2','T3','T4','T5','T6','T7','CN']">
                        <div :class="currentG().schedule.includes(day) ? 'bg-red-600 text-white font-black' : 'text-white/10'"
                             class="flex-1 text-[8px] py-1 rounded-md text-center border border-white/5" x-text="day"></div>
                    </template>
                </div>
            </div>
        </div>

        <div class="mb-4">
            <div class="bg-slate-800/40 rounded-[2.5rem] p-6 border border-white/5 text-center shadow-xl">
                <div class="text-[10px] font-black uppercase text-white/40 mb-4 tracking-widest">Xác suất nổ: <span class="text-red-500" x-text="currentG().name"></span></div>
                
                <div class="flex flex-wrap justify-center min-h-[60px] items-center mb-6">
                    <template x-if="loading">
                        <div class="flex gap-1 animate-pulse"><div class="w-2 h-2 bg-red-500 rounded-full"></div><div class="w-2 h-2 bg-red-500 rounded-full"></div><div class="w-2 h-2 bg-red-500 rounded-full"></div></div>
                    </template>
                    <template x-if="!loading && results.length > 0">
                        <div class="flex flex-wrap justify-center animate-in zoom-in duration-300">
                            <template x-for="(num, idx) in results" :key="idx">
                                <span :class="getBallColor(idx)" class="ball" x-text="num"></span>
                            </template>
                        </div>
                    </template>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button @click="runAI(false)" class="bg-orange-600 h-12 rounded-2xl font-black uppercase text-[10px] text-white shadow-lg shadow-orange-600/20">Phân Tích AI</button>
                    <button @click="runAI(true)" class="bg-yellow-600 h-12 rounded-2xl font-black uppercase text-[10px] text-white opacity-90 shadow-lg shadow-yellow-600/20">Soi Jackpot</button>
                </div>
            </div>
        </div>

        <div class="mb-6">
            <div class="bg-indigo-600 p-6 rounded-[2.5rem] shadow-xl">
                <h3 class="text-[11px] font-black uppercase mb-4 tracking-widest flex items-center gap-2"><i data-lucide="sparkles" class="w-4 h-4"></i> Vận mệnh ngày sinh</h3>
                <div class="grid grid-cols-3 gap-2 mb-4">
                    <select class="bg-black/20 border border-white/10 rounded-xl p-3 text-xs outline-none"><template x-for="d in 31"><option :value="d" x-text="d"></option></template></select>
                    <select class="bg-black/20 border border-white/10 rounded-xl p-3 text-xs outline-none"><template x-for="m in 12"><option :value="m" x-text="'Tháng '+m"></option></template></select>
                    <select class="bg-black/20 border border-white/10 rounded-xl p-3 text-xs outline-none"><option value="2026">2026</option></select>
                </div>
                <button @click="runAI(false, true)" class="w-full bg-white text-indigo-700 h-12 rounded-2xl font-black text-[10px] uppercase shadow-md">Tạo số may mắn</button>
            </div>
        </div>
    </main>

    <nav class="flex-none bg-slate-900 border-t border-white/5 px-8 py-4 pb-8 flex justify-between items-center">
        <div class="text-red-500 flex flex-col items-center gap-1"><i data-lucide="home" class="w-5 h-5"></i><span class="text-[8px] font-black uppercase">Home</span></div>
        <div class="text-white/20 flex flex-col items-center gap-1"><i data-lucide="history" class="w-5 h-5"></i><span class="text-[8px] font-black uppercase">Lịch sử</span></div>
        <div class="text-white/20 flex flex-col items-center gap-1"><i data-lucide="bar-chart-2" class="w-5 h-5"></i><span class="text-[8px] font-black uppercase">Thống kê</span></div>
        <div class="text-white/20 flex flex-col items-center gap-1"><i data-lucide="user" class="w-5 h-5"></i><span class="text-[8px] font-black uppercase">Me</span></div>
    </nav>

    <script>
        function app() {
            return {
                activeGame: 'mega645', loading: false, results: [], jackpotRate: 46, formattedJackpot: '27.617 Tỷ Đ', currentKy: '01486',
                
                allGames: [
                    { id: 'mega645', name: 'Mega 6/45', max: 45, count: 6, schedule: ['T4','T6','CN'], type: 'ball' },
                    { id: 'power655', name: 'Power 6/55', max: 55, count: 7, schedule: ['T3','T5','T7'], type: 'ball' },
                    { id: 'lotto535', name: 'Lotto 5/35', max: 35, count: 5, schedule: ['T2','T3','T4','T5','T6','T7','CN'], type: 'ball' },
                    { id: 'max3d', name: 'Max 3D', max: 9, count: 3, schedule: ['T2','T4','T6'], type: '3d' },
                    { id: 'max3dplus', name: 'Max 3D+', max: 9, count: 6, schedule: ['T2','T4','T6'], type: '3d' },
                    { id: 'max3dpro', name: 'Max 3D Pro', max: 9, count: 6, schedule: ['T3','T5','T7'], type: '3d' },
                    { id: 'keno', name: 'Keno', max: 80, count: 10, schedule: ['T2','T3','T4','T5','T6','T7','CN'], type: 'ball' },
                    { id: 'bingo18', name: 'Bingo 18', max: 6, count: 3, schedule: ['T2','T3','T4','T5','T6','T7','CN'], type: 'ball' }
                ],

                startApp() { lucide.createIcons(); this.updateStats(); },
                currentG() { return this.allGames.find(g => g.id === this.activeGame); },
                selectGame(id) { this.activeGame = id; this.results = []; this.updateStats(); },
                
                updateStats() {
                    const game = this.currentG();
                    let base = game.id === 'power655' ? 150.234 : 27.617;
                    this.formattedJackpot = (base + Math.random()).toFixed(3) + " Tỷ Đ";
                    this.jackpotRate = Math.floor(Math.random() * 50) + 30;
                },

                getBallColor(idx) {
                    const g = this.currentG();
                    if (g.id === 'power655' && idx === 6) return 'bg-special';
                    if (['mega645', 'power655', 'lotto535'].includes(g.id)) return 'bg-mega';
                    return 'bg-blue';
                },

                runAI(isJackpot, isBirthday = false) {
                    this.loading = true;
                    const g = this.currentG();
                    setTimeout(() => {
                        let final = [];
                        if (g.type === '3d') {
                            for(let i=0; i<g.count; i++) final.push(Math.floor(Math.random() * 10));
                        } else {
                            let s = new Set();
                            while(s.size < g.count) s.add(Math.floor(Math.random() * g.max) + 1);
                            final = Array.from(s).sort((a,b)=>a-b).map(n => n < 10 ? '0'+n : n);
                        }
                        this.results = final;
                        this.loading = false;
                        if (isJackpot || isBirthday) {
                            confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 }, colors: ['#ff0000', '#ffd700'] });
                            if (window.navigator.vibrate) window.navigator.vibrate([100, 50, 100]);
                        }
                    }, 800);
                }
            }
        }
    </script>
</body>
</html>
